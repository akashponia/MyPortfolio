<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Ponia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: #fefcfc;
        }

        header {
            background-color: black;
            height: 60px;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100%;
            font-size: 1.3rem;
        }

        .menu ul {
            display: flex;
        }

        .menu ul li {
            list-style: none;
            padding: 10px;
        }

        .menu ul li a {
            text-decoration: none;
            color: white;
        }

        .logo {
            color: white;
        }

        .Intro {
            display: flex;
            justify-content: space-around;
        }

        .Intro>div {
            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: center;
            font-size: 1.5rem;
            width: 35%;         
        }

        .TextIntro > div > span{
            color: blue;
        }

        /* .TextIntro {
            background-color: blue;
        } */

        .bgImage {
            background-color: aqua;
        }

        .bgImage img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">Akash's Portfolio</div>
            <div class="menu">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/">About</a></li>
                    <li><a href="/">Skills</a></li>
                    <li><a href="/">Education</a></li>
                    <li><a href="/">Experience</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <section class="Intro">
        <div class="TextIntro">
            <div>
                Hi, I am <span>Akash Ponia</span>
            </div>
            <div>And I am a Full Stack Developer </div>
        </div>
        <div class="bgImage">
            <img src="bgImage.jpg" alt="">
        </div>
    </section>
</body>

</html>
